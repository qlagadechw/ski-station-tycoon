<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Sky background -->
  <rect width="128" height="128" fill="#2255aa"/>
  <!-- Mountain shapes -->
  <polygon points="10,100 50,30 90,100" fill="#334466"/>
  <polygon points="40,100 75,40 110,100" fill="#445577"/>
  <!-- Snow caps -->
  <polygon points="50,30 38,60 62,60" fill="white"/>
  <polygon points="75,40 63,65 87,65" fill="white"/>
  <!-- Ski slope -->
  <line x1="55" y1="35" x2="95" y2="90" stroke="#4488ff" stroke-width="3"/>
  <!-- Valley -->
  <rect x="0" y="95" width="128" height="33" fill="#336622"/>
  <!-- Village dots -->
  <rect x="52" y="90" width="8" height="10" fill="#cc9944"/>
  <rect x="64" y="88" width="8" height="12" fill="#bb8833"/>
</svg>
